name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack
        run: npm pack
        id: pack

      - name: Get package name from tarball
        id: tarball
        run: |
          TGZ=$(ls *.tgz)
          echo "file=$TGZ" >> $GITHUB_OUTPUT

      - name: Create Release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.tarball.outputs.file }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
