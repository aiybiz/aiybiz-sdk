name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify version matches tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package.json version : $PKG_VERSION"
          echo "Git tag version      : $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch: package.json has $PKG_VERSION but tag is $GITHUB_REF_NAME"
            echo "Update package.json version to $TAG_VERSION before tagging."
            exit 1
          fi
          echo "✅ Versions match: $PKG_VERSION"

      - name: Pack
        run: npm pack

      - name: Get tarball filename
        id: tarball
        run: |
          TGZ=$(ls *.tgz)
          echo "file=$TGZ" >> $GITHUB_OUTPUT
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          echo "Tarball: $TGZ"

      - name: Create Release and upload tarball
        uses: softprops/action-gh-release@v2
        with:
          name: "aiybiz v${{ github.ref_name }}"
          files: ${{ steps.tarball.outputs.file }}
          generate_release_notes: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Docker image ──────────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.openclaw-embedded
          build-args: AIYBIZ_TGZ=${{ steps.tarball.outputs.file }}
          push: true
          tags: |
            ghcr.io/aiybiz/aiybiz-openclaw:latest
            ghcr.io/aiybiz/aiybiz-openclaw:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
